# 测试提示词模板

# 待测模型的系统提示
system_prompt: |
  你是一个地理学专家。请根据题目要求准确回答问题。

# 各题型的用户提示模板
task_prompts:
  # 选择题 (AP Study + NPEE Choice)
  choice: |
    请回答以下地理选择题，只输出选项字母（如A、B、C、D、E），不要输出任何其他内容。

    题目：{question}

    选项：
    {choices}

    你的答案是：

  # 判断题 (NPEE TF)
  tf: |
    请判断以下地理陈述的对错，只输出"True"或"False"，不要输出任何其他内容。

    题目：{question}

    你的答案是：

  # 填空题 (NPEE Completion)
  completion: |
    请回答以下地理填空题，简洁准确地给出答案，不要输出任何解释或额外内容。

    题目：{question}

    答案：

  # 名词解释 (NPEE Noun)
  noun: |
    请解释以下地理学术语或概念，要求准确、全面、简洁。

    术语：{question}

    解释：

  # 问答 (NPEE QA)
  qa: |
    请回答以下地理问题，要求准确、有条理、全面。

    题目：{question}

    答案：

  # 讨论 (NPEE Discussion)
  discussion: |
    请深入讨论以下地理话题，要求内容准确、逻辑清晰、论述全面。

    主题：{question}

    答案：

# Judge提示词模板
judge_prompts:
  # 名词解释评分 (0-6分)
  noun: |
    你是地理学评测专家。请对以下名词解释进行评分。

    术语：{question}
    参考解释：{reference}
    模型解释：{answer}

    评分维度（每项0-2分）：
    1. 核心定义准确度：是否正确解释了该地理概念的本质
    2. 关键要素完整度：是否涵盖了重要特征/数值/条件
    3. 表述清晰度：语言是否准确、专业、易懂

    总分：0-6分
    - 5-6分：优秀，与参考答案相当或更好
    - 3-4分：良好，基本正确但有遗漏
    - 1-2分：及格，部分正确
    - 0分：错误或答非所问

    请以JSON格式输出（仅输出JSON，不要有其他内容）：
    {{
      "scores": {{"核心定义": 2, "关键要素": 1, "表述清晰": 2}},
      "total": 5,
      "reasoning": "简要评语"
    }}

  # 问答评分 (0-10分)
  qa: |
    你是地理学评测专家。请对以下问答题进行评分。

    题目：{question}
    参考答案：{reference}
    模型答案：{answer}

    评分维度（每项0-2分）：
    1. 内容准确性：知识点是否正确
    2. 完整性：是否覆盖了参考答案的主要要点
    3. 逻辑性：论述是否有条理、因果清晰
    4. 深度：是否体现了对概念的深入理解
    5. 专业性：术语使用是否准确、表述是否规范

    总分：0-10分
    - 9-10分：优秀
    - 7-8分：良好
    - 5-6分：及格
    - 0-4分：不及格

    请以JSON格式输出（仅输出JSON，不要有其他内容）：
    {{
      "scores": {{"准确性": 2, "完整性": 1, "逻辑性": 2, "深度": 1, "专业性": 2}},
      "total": 8,
      "strengths": ["优点1", "优点2"],
      "weaknesses": ["不足1"],
      "reference_coverage": "覆盖了参考答案约70%的内容"
    }}

  # 讨论题评分 (0-10分)
  discussion: |
    你是地理学评测专家。请对以下讨论题进行评分。

    主题：{question}
    参考答案：{reference}
    模型答案：{answer}

    评分维度（每项0-2分）：
    1. 内容准确性：知识点是否正确
    2. 完整性：是否覆盖了参考答案的主要要点
    3. 逻辑性：论述是否有条理、因果清晰
    4. 深度：是否体现了对概念的深入理解
    5. 专业性：术语使用是否准确、表述是否规范

    总分：0-10分
    - 9-10分：优秀
    - 7-8分：良好
    - 5-6分：及格
    - 0-4分：不及格

    请以JSON格式输出（仅输出JSON，不要有其他内容）：
    {{
      "scores": {{"准确性": 2, "完整性": 1, "逻辑性": 2, "深度": 1, "专业性": 2}},
      "total": 8,
      "strengths": ["优点1", "优点2"],
      "weaknesses": ["不足1"],
      "reference_coverage": "覆盖了参考答案约70%的内容"
    }}
